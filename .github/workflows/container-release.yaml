---
name: publish container

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vault-raft-backup

jobs:
  publish:
    name: build and publish container image
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ github.event.release.tag_name }}
          type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
          type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
          type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
          type=raw,value=latest
        labels: |
          org.opencontainers.image.title=vault-raft-backup
          org.opencontainers.image.description=Vault Raft Backup creates Hashicorp Vault Raft snapshots and transfers them to supported storage backends.
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.version=${{ github.event.release.tag_name }}
          org.opencontainers.image.licenses=BSD-3-Clause
    - name: build and publish image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VERSION=${{ github.event.release.tag_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: true
        sbom: true
