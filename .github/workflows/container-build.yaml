---
name: container build

on:
  push:
    branches: [master]
    paths:
    - '**.go'
    - 'go.mod'
    - 'go.sum'
    - 'Dockerfile'
    - '.dockerignore'
    - '.github/workflows/container-build.yaml'
    - '.github/workflows/container-release.yaml'
  pull_request:
    branches: [master]
    paths:
    - '**.go'
    - 'go.mod'
    - 'go.sum'
    - 'Dockerfile'
    - '.dockerignore'
    - '.github/workflows/container-build.yaml'
    - '.github/workflows/container-release.yaml'

permissions:
  contents: read

jobs:
  container-build:
    name: build container image
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: build image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        load: true
        push: false
        tags: vault-raft-backup:ci
        build-args: |
          VERSION=ci-test
        cache-from: type=gha
    - name: smoke test version
      run: |
        output="$(docker run --rm vault-raft-backup:ci -version 2>&1)"
        echo "${output}"
        echo "${output}" | grep -q "ci-test"
